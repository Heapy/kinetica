product: jvm/lib

repositories:
  - id: mavenLocal
    url: mavenLocal
    publish: true

settings:
  kotlin:
    version: 2.4.10
    languageVersion: 2.4
    apiVersion: 2.4
    optIns:
      - org.jetbrains.kotlin.compiler.plugin.ExperimentalCompilerApi
      - org.jetbrains.kotlin.ir.symbols.UnsafeDuringIrConstructionAPI
  publishing:
    enabled: true
    group: io.heapy.kinetica
    artifactId: kinetica-compiler
    version: 0.3.0
    publishSources: true
    pom:
      url: https://github.com/Heapy/kinetica
      scm: https://github.com/Heapy/kinetica.git
      developers:
        - name: Ruslan Ibrahimau
      licenses:
        - name: The Apache License, Version 2.0
          url: https://www.apache.org/licenses/LICENSE-2.0.txt

dependencies:
  - org.jetbrains.kotlin:kotlin-compiler-embeddable:2.4.10: compile-only

test-dependencies:
  - ../kinetica-runtime
  - org.jetbrains.kotlin:kotlin-compiler-embeddable:2.4.10

description: "Kinetica compiler-plugin contract module for K2 responsibilities and generated metadata."
