name: Benchmarks

# Manual only: benchmark numbers from shared CI runners are noisy and are NOT comparable
# with the committed results (different machine/Chromium). Useful for relative A/B checks.
on:
  workflow_dispatch:
    inputs:
      samples:
        description: Measured samples per operation
        default: "5"
      frameworks:
        description: Comma-separated frameworks (empty = all)
        default: ""
      tree:
        description: Also run the deep-tree bench
        default: "false"
      scaling:
        description: Also run scaling curves
        default: "false"
      stress:
        description: Also run the 10k-100k Kinetica/React/Vanilla stress curves
        default: "false"

jobs:
  bench:
    name: js-framework-benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-kinetica

      - name: Run benchmarks
        run: |
          SUITES="main"
          if [ "${{ inputs.tree }}" = "true" ]; then SUITES="$SUITES,tree"; fi
          if [ "${{ inputs.scaling }}" = "true" ]; then SUITES="$SUITES,scaling"; fi
          if [ "${{ inputs.stress }}" = "true" ]; then SUITES="$SUITES,stress"; fi
          ARGS="--iterations=${{ inputs.samples }} --suites=$SUITES --with-deps"
          if [ -n "${{ inputs.frameworks }}" ]; then ARGS="$ARGS --frameworks=${{ inputs.frameworks }}"; fi
          node bench/run.mjs $ARGS

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: bench-report
          path: |
            bench/results/runs/**/report.html
            bench/results/runs/**/report.js
            bench/results/runs/**/*.json
