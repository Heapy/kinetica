name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jvm:
    name: JVM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      # Exact-input build caches are safe to reuse and make non-Kotlin follow-up commits
      # avoid recompilation. Deliberately omit restore-keys: stale compiler outputs are
      # riskier than a cold build.
      - name: Restore JVM build outputs
        id: jvm-build-cache
        uses: actions/cache/restore@v5
        with:
          path: build
          key: kinetica-jvm-build-${{ runner.os }}-${{ hashFiles('.github/actions/setup-kinetica/action.yml', '.github/workflows/ci.yml', 'kotlin', 'project.yaml', 'common.module-template.yaml', '**/module.yaml', '**/plugin.yaml', '**/*.kt', '**/*.java', '**/resources/**', '**/testResources/**') }}

      - uses: ./.github/actions/setup-kinetica

      # Every project module resolves the compiler plugin from the toolchain-local Maven
      # repository, so publish it before asking the CLI to construct the project graph.
      - name: Publish compiler plugin
        run: ./kotlin publish mavenLocal -m kinetica-compiler

      # One CLI invocation shares project discovery and task scheduling across the whole
      # JVM graph. The repeated -m form is supported by Kotlin Toolchain 0.11.
      - name: JVM test suite
        run: |
          set -euo pipefail
          ./kotlin test --platform jvm \
            -m kinetica-compiler \
            -m kinetica-runtime \
            -m kinetica-markdown \
            -m kinetica-router \
            -m kinetica-forms \
            -m kinetica-motion \
            -m kinetica-persist \
            -m kinetica-theme \
            -m kinetica-data \
            -m kinetica-test \
            -m server-components-shared \
            -m server-components \
            -m todo \
            -m game-of-life-model

      - name: Save JVM build outputs
        if: steps.jvm-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: build
          key: ${{ steps.jvm-build-cache.outputs.cache-primary-key }}

      - name: Compiler plugin JVM sample
        run: ./kotlin run -m annotated

      - name: JVM microbenchmarks (smoke)
        run: ./kotlin run -m bench-jvm -- --warmup=1 --samples=3

  browser:
    name: JS, browser & docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      # This cache contains only reproducible build products and uses an exact input hash.
      # It is saved before verification, so a late browser failure does not force the next
      # commit to repeat several minutes of unchanged Kotlin compilation.
      - name: Restore browser build outputs
        id: browser-build-cache
        uses: actions/cache/restore@v5
        with:
          path: build
          key: kinetica-browser-build-${{ runner.os }}-${{ hashFiles('.github/actions/setup-kinetica/action.yml', '.github/workflows/ci.yml', 'kotlin', 'project.yaml', 'common.module-template.yaml', '**/module.yaml', '**/plugin.yaml', '**/*.kt', '**/*.java', 'samples/**/*.mjs', 'samples/**/*.js', 'samples/**/*.jsx', 'samples/**/*.css', 'samples/**/*.html', 'docs/docs-site/resources/**', 'scripts/build-game-of-life.mjs', 'scripts/bundle-docs.mjs', 'scripts/lib/**', 'bench/build*.mjs', 'bench/package.json', 'bench/package-lock.json', 'bench/game-of-life/report.html', 'bench/results/game-of-life/results.json') }}

      - uses: ./.github/actions/setup-kinetica
        with:
          # A cache hit only runs Node/Java verification against finished artifacts. Avoid
          # downloading the ~1 GB project-local Kotlin state when no Kotlin command runs.
          setup-kotlin: ${{ steps.browser-build-cache.outputs.cache-hit != 'true' }}

      - name: Install bench Node dependencies
        run: npm ci --prefix bench --no-audit --no-fund

      - name: Publish compiler plugin
        if: steps.browser-build-cache.outputs.cache-hit != 'true'
        run: ./kotlin publish mavenLocal -m kinetica-compiler

      # Build the complete JS graph once. Subsequent verification steps consume artifacts
      # and never invoke the Kotlin CLI again.
      - name: Build browser artifacts
        if: steps.browser-build-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          ./kotlin build --platform js \
            -m annotated-js \
            -m kinetica-browser \
            -m browser-tests \
            -m browser-counter \
            -m browser-game-of-life \
            -m browser-game-of-life-compose \
            -m browser-todo \
            -m browser-bench \
            -m docs-client \
            -m server-components-client \
            -m game-of-life-model \
            -m kinetica-runtime \
            -m kinetica-test
          ./kotlin package -m docs-site
          node scripts/build-game-of-life.mjs --skip-kotlin-build
          node scripts/bundle-docs.mjs --skip-kotlin-build

      - name: Save browser build outputs
        if: steps.browser-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: build
          key: ${{ steps.browser-build-cache.outputs.cache-primary-key }}

      - name: Compiler plugin JS sample
        run: node build/tasks/_annotated-js_linkJs/annotated-js.mjs

      - name: Browser-runtime JS tests
        run: node build/tasks/_kinetica-browser_linkJsTest/kinetica-browser_test.mjs

      - name: Game of Life model tests
        run: |
          set -euo pipefail
          node build/tasks/_game-of-life-model_linkJsTest/game-of-life-model_test.mjs
          node samples/game-of-life-shared/life-core.test.mjs
          node bench/game-of-life/validate-results.mjs

      - name: Runtime & test-kit JS tests
        run: |
          set -euo pipefail
          node build/tasks/_kinetica-runtime_linkJsTest/kinetica-runtime_test.mjs
          node build/tasks/_kinetica-test_linkJsTest/kinetica-test_test.mjs

      # Fails when a tracked artifact's gzip size grows >10% over the committed baseline.
      - name: Bundle size check
        run: node scripts/size-report.mjs

      - name: Restore Playwright browser
        id: playwright-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.61.1

      - name: Install Playwright
        run: |
          mkdir -p .tools/playwright && cd .tools/playwright
          npm init -y >/dev/null
          npm install --no-audit --no-fund --save-exact playwright@1.61.1
          npx playwright install --with-deps --only-shell chromium

      - name: Save Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ steps.playwright-cache.outputs.cache-primary-key }}

      - name: Browser verification (samples)
        env:
          PLAYWRIGHT_IMPORT: ${{ github.workspace }}/.tools/playwright/node_modules/playwright/index.mjs
        run: |
          set -euo pipefail
          node -e 'import("./bench/driver/server.mjs").then(m => m.startServer(process.cwd(), 4173))' &
          SERVER_PID=$!
          sleep 1
          node scripts/verify-browser.mjs
          kill $SERVER_PID

      - name: Docs site verification
        env:
          PLAYWRIGHT_IMPORT: ${{ github.workspace }}/.tools/playwright/node_modules/playwright/index.mjs
        run: |
          set -euo pipefail
          PORT=8080 java -jar build/tasks/_docs-site_executableJarJvm/docs-site-jvm-executable.jar &
          SITE_PID=$!
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8080/healthz >/dev/null && break
            sleep 1
          done
          DOCS_BASE_URL=http://127.0.0.1:8080 node docs/verify-docs.mjs
          kill $SITE_PID

  macos:
    name: macOS native
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      # Exact-input build caches, same policy as the JVM job: no restore-keys because
      # stale compiler outputs are riskier than a cold build.
      - name: Restore macOS build outputs
        id: macos-build-cache
        uses: actions/cache/restore@v5
        with:
          path: build
          key: kinetica-macos-build-${{ runner.os }}-${{ hashFiles('.github/actions/setup-kinetica/action.yml', '.github/workflows/ci.yml', 'kotlin', 'project.yaml', 'common.module-template.yaml', '**/module.yaml', '**/plugin.yaml', '**/*.kt', '**/*.java', '**/resources/**', '**/testResources/**') }}

      # The Kotlin/Native toolchain download is ~1 GB; key it by the Kotlin version pinned
      # in the shared module template.
      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: kinetica-konan-${{ runner.os }}-${{ hashFiles('common.module-template.yaml') }}

      - uses: ./.github/actions/setup-kinetica

      - name: Publish compiler plugin
        run: ./kotlin publish mavenLocal -m kinetica-compiler

      # kinetica-runtime's own test sources need internal (friend) access, which the
      # toolchain does not provide to Native test compilations yet; the runtime still
      # compiles and is exercised natively as a dependency of every module below.
      - name: Native test suite (macosArm64)
        run: |
          set -euo pipefail
          ./kotlin test --platform macosArm64 \
            -m kinetica-test \
            -m kinetica-forms \
            -m kinetica-data \
            -m kinetica-persist \
            -m kinetica-router \
            -m kinetica-motion \
            -m kinetica-theme

      # Smoke-build the native macOS sample: compiles kinetica-appkit (the AppKit renderer) and
      # links a macosArm64 executable. GUI launch is not automated (no display in CI); the build
      # itself exercises the full toolchain path: K2 plugin + Native IR + AppKit interop.
      - name: Build native macOS sample (macosArm64)
        run: ./kotlin build -m native-counter

      - name: Save macOS build outputs
        if: steps.macos-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: build
          key: ${{ steps.macos-build-cache.outputs.cache-primary-key }}

  required:
    name: Build, test & verify
    if: ${{ always() }}
    needs: [jvm, browser, macos]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required jobs
        env:
          JVM_RESULT: ${{ needs.jvm.result }}
          BROWSER_RESULT: ${{ needs.browser.result }}
          MACOS_RESULT: ${{ needs.macos.result }}
        run: |
          echo "JVM: $JVM_RESULT"
          echo "JS, browser & docs: $BROWSER_RESULT"
          echo "macOS native: $MACOS_RESULT"
          test "$JVM_RESULT" = "success"
          test "$BROWSER_RESULT" = "success"
          test "$MACOS_RESULT" = "success"
