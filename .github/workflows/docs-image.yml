name: Docs image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push kinetica-docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-kinetica

      - name: Compute image name (registry requires lowercase)
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/kinetica-docs" >> "$GITHUB_OUTPUT"

      - name: Build image
        env:
          IMAGE: ${{ steps.image.outputs.name }}
        run: ./docs/docker-build.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          IMAGE=${{ steps.image.outputs.name }}
          docker tag "$IMAGE" "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
