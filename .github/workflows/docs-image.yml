name: Docs image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push kinetica-docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-kinetica

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name (registry requires lowercase)
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/kinetica-docs" >> "$GITHUB_OUTPUT"

      - name: Install bench Node dependencies
        run: npm ci --prefix bench --no-audit --no-fund

      - name: Stage image context
        run: STAGE_ONLY=1 ./docs/docker-build.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        run: |
          IMAGE=${{ steps.image.outputs.name }}
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "$IMAGE:latest" \
            --tag "$IMAGE:${{ github.sha }}" \
            --push \
            docs/.docker-stage
