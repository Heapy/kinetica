name: Docs image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push kinetica-docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-kinetica

      - name: Build image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/kinetica-docs
        run: ./docs/docker-build.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/kinetica-docs
          docker tag "$IMAGE" "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
