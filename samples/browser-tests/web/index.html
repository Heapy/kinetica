<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kinetica Browser Tests</title>
  <style>
    :root {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #171a1f;
    }
    body {
      margin: 0;
      padding: 24px;
    }
    main {
      display: grid;
      gap: 16px;
      max-width: 760px;
    }
    #fixture,
    #results {
      padding: 16px;
      background: #ffffff;
      border: 1px solid #d8dee8;
      border-radius: 8px;
    }
    [data-status="pass"] {
      color: #186a3b;
    }
    [data-status="fail"] {
      color: #a5282c;
    }
  </style>
</head>
<body>
  <main>
    <div id="fixture"></div>
    <div id="results" aria-live="polite"></div>
  </main>
  <script type="module" src="../../../build/tasks/_browser-tests_linkJs/browser-tests.mjs"></script>
</body>
</html>
