<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Conway's Game of Life implemented with Compose HTML.">
  <title>Compose HTML · Conway’s Game of Life</title>
  <link rel="stylesheet" href="../../game-of-life-shared/styles.css">
  <script>
    window.__mountMs = undefined;
    new MutationObserver(function (records, observer) {
      if (document.querySelector('[data-testid="life-grid"]')) {
        window.__mountMs = performance.now();
        observer.disconnect();
      }
    }).observe(document.documentElement, { childList: true, subtree: true });
  </script>
</head>
<body>
  <div id="app"></div>
  <noscript>This demo needs JavaScript to evolve the universe.</noscript>
  <script type="module" src="../../../build/tasks/_browser-game-of-life-compose_bundle/main.mjs"></script>
</body>
</html>
