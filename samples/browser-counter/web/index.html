<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kinetica Counter</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #171a1f;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    main {
      width: min(420px, calc(100vw - 32px));
      padding: 24px;
      background: #ffffff;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      box-shadow: 0 18px 60px rgba(31, 39, 51, 0.12);
    }
    button {
      min-width: 44px;
      min-height: 38px;
      border: 1px solid #adb7c8;
      border-radius: 6px;
      background: #ffffff;
      color: #171a1f;
      font: inherit;
      cursor: pointer;
    }
    button:hover:not(:disabled) {
      background: #eef3fb;
      border-color: #6d8fca;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }
  </style>
</head>
<body>
  <main id="app" aria-live="polite"></main>
  <script type="module" src="../../../build/tasks/_browser-counter_linkJs/browser-counter.mjs"></script>
</body>
</html>
