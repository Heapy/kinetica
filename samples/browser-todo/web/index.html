<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kinetica Todo</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #171a1f;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 32px 16px;
    }
    main {
      width: min(720px, 100%);
      padding: 24px;
      background: #ffffff;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      box-shadow: 0 18px 60px rgba(31, 39, 51, 0.12);
    }
    input[type="text"] {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 38px;
      border: 1px solid #adb7c8;
      border-radius: 6px;
      padding: 0 12px;
      font: inherit;
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }
    button {
      min-height: 38px;
      border: 1px solid #adb7c8;
      border-radius: 6px;
      background: #ffffff;
      color: #171a1f;
      font: inherit;
      cursor: pointer;
      padding: 0 12px;
    }
    button:hover:not(:disabled) {
      background: #eef3fb;
      border-color: #6d8fca;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }
    [role="listitem"],
    [data-kinetica-tag="row"] {
      width: 100%;
    }
  </style>
</head>
<body>
  <main id="app"></main>
  <script type="module" src="../../../build/tasks/_browser-todo_linkJs/browser-todo.mjs"></script>
</body>
</html>
